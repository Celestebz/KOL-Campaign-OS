interface:
  display_name: "KOL Campaign OS"
  short_description: "Create Strategy first, then run Video Evidence Finder for human-reviewed Raw Candidates."
  default_prompt: "Use KOL Campaign OS end to end through the HTTP APIs. Inspect or create the Campaign, create or improve KOL Strategy, mark it ready when Finder should run, confirm the current target platform if it was not explicitly selected, then use Video Evidence Finder only. The final goal is KOL profile links, but profile URLs are identity/leads; import target-platform video evidence first with video_url plus author_profile_url. Use execution_mode=video_evidence_finder, discovery_scope=target_platform_only, discovery_route=target_platform_first, allow_cross_platform_evidence=false, and target_platform=evidence_platform. Do not ask for old Cycle/Route/Subagent Hybrid settings. Do not import Instagram/YouTube/TikTok profile URLs as video_url; open profiles only to find Reels/Posts/videos. Crawl imported videos, run evidence analysis, then generate Raw Candidates from evidence. The app uses MySQL through APIs only; do not write ad hoc database scripts or use SQLite. Do not approve candidates into KOL Master."
