interface:
  display_name: "KOL Campaign OS"
  short_description: "Create Strategy first, run Finder, and write Raw Candidates for human approval."
  default_prompt: "Use KOL Campaign OS end to end through the HTTP APIs: inspect or create the Campaign, create or improve KOL Strategy, mark it ready, confirm the current target platform before Finder even when a ready Strategy already exists, then use Video Evidence Finder by default. The final goal is still KOL profile links, but profile URLs are identity/leads; import target-platform video evidence first with video_url plus author_profile_url. Use execution_mode=video_evidence_finder, discovery_scope=target_platform_only, allow_cross_platform_evidence=false. Do not import Instagram/YouTube/TikTok profile URLs as video evidence; open profiles only to find Reels/Posts/videos. Crawl imported videos, run evidence analysis, then generate Raw Candidates from evidence. The app uses MySQL; do not read/write SQLite files or use SQLite-only SQL. Treat ignored Raw Candidates as project-level rejection only; global no-cooperation must come from KOL Master do_not_contact status and must be reported as risk_review, not silently hidden. Before creating a new Campaign for KOL search, collect target market, target platform, campaign goal, target count, and follower/tier requirements. Do not approve candidates into KOL Master."
