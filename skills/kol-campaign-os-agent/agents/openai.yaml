interface:
  display_name: "KOL Campaign OS"
  short_description: "Create Strategy first, run Finder, and write Raw Candidates for human approval."
  default_prompt: "Use KOL Campaign OS end to end through the HTTP APIs: inspect or create the Campaign, create or improve KOL Strategy, mark it ready, confirm the current target platform before Finder even when a ready Strategy already exists, run Finder for the confirmed target platform, and write accepted/rejected Raw Candidates back into the system. The app uses MySQL; do not read/write SQLite files or use SQLite-only SQL. Treat ignored Raw Candidates as project-level rejection only; global no-cooperation must come from KOL Master do_not_contact status and must be reported as risk_review, not silently hidden. Before creating a new Campaign for KOL search, collect target market, target platform, campaign goal, target count, and follower/tier requirements. Do not approve candidates into KOL Master."
